<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Active Focus Session - Analytics Pro</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;family=JetBrains+Mono:wght@400;500;700;800&amp;family=IBM+Plex+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#D4FF00",
              "secondary": "#00F2FE",
              "background-light": "#f8f8f5",
              "background-dark": "#050505",
              "surface": "#121212",
              "surface-hover": "#1E1E1E",
              "text-main": "#E0E0E0",
              "muted": "#6B6B6B",
              "danger": "#FF0055",
            },
            fontFamily: {
              "display": ["Space Grotesk", "sans-serif"],
              "body": ["IBM Plex Sans", "sans-serif"],
              "mono": ["JetBrains Mono", "monospace"],
            },
            borderRadius: {
                "DEFAULT": "0px", 
                "sm": "2px",
                "lg": "0px", 
                "xl": "0px", 
                "full": "9999px"
            },
            boxShadow: {
                'neon': '0 0 8px rgba(212, 255, 0, 0.4)',
                'neon-cyan': '0 0 8px rgba(0, 242, 254, 0.4)',
            }
          },
        },
      }
    </script>
<style>
        body {
            background-color: #050505;
            color: #E0E0E0;
        }
        
        /* Subtle pulse for active state if needed, implemented via tailwind animate-pulse generally, but custom keyframes can go here if complex */
        @keyframes subtlePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        .pulse-slow {
            animation: subtlePulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-text-main font-body h-screen w-screen overflow-hidden flex flex-col items-center justify-between selection:bg-primary selection:text-background-dark antialiased">
<!-- Top Section: Status & Subject -->
<header class="w-full pt-12 pb-6 px-6 flex flex-col items-center justify-start z-10 relative">
<div class="flex items-center gap-2 mb-2">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse" style="box-shadow: 0 0 8px rgba(212, 255, 0, 0.6);"></span>
<span class="font-mono text-[10px] uppercase tracking-[0.1em] text-primary font-bold">Recording Telemetry</span>
</div>
<h1 class="font-mono text-secondary text-[12px] font-bold uppercase tracking-[0.1em] text-center drop-shadow-[0_0_4px_rgba(0,242,254,0.3)]">
            TARGET: PHARMACOLOGY
        </h1>
<p class="font-mono text-muted text-[10px] uppercase tracking-[0.05em] mt-1">
            BLOCK 02 • VELOCITY: OPTIMAL
        </p>
</header>
<!-- Center Section: Monolithic Timer & Velocity Ring -->
<main class="flex-1 w-full flex flex-col items-center justify-center relative">
<!-- Velocity Ring Container -->
<div class="relative w-[320px] h-[320px] sm:w-[400px] sm:h-[400px] flex items-center justify-center">
<!-- SVG Ring -->
<svg class="absolute inset-0 w-full h-full -rotate-90 transform" viewbox="0 0 100 100">
<!-- Background Track -->
<circle cx="50" cy="50" fill="none" r="48" stroke="#121212" stroke-width="1"></circle>
<!-- Progress Ring (approx 70% filled) -->
<circle class="drop-shadow-[0_0_8px_rgba(212,255,0,0.5)] transition-all duration-1000 ease-linear" cx="50" cy="50" fill="none" r="48" stroke="#D4FF00" stroke-dasharray="301.59" stroke-dashoffset="90" stroke-width="1"></circle>
<!-- Milestone Markers (15, 30, 45, 60 min marks) -->
<line stroke="#6B6B6B" stroke-width="1" x1="50" x2="50" y1="0" y2="4"></line>
<line stroke="#6B6B6B" stroke-width="1" x1="100" x2="96" y1="50" y2="50"></line>
<line stroke="#6B6B6B" stroke-width="1" x1="50" x2="50" y1="100" y2="96"></line>
<line stroke="#6B6B6B" stroke-width="1" x1="0" x2="4" y1="50" y2="50"></line>
</svg>
<!-- Chronometer -->
<div class="z-10 flex flex-col items-center">
<div class="font-mono text-[64px] sm:text-[80px] font-medium leading-none tracking-[-0.05em] text-white">
                    00:42<span class="text-primary text-[48px] sm:text-[60px] ml-1">:15</span>
</div>
<!-- Mini Stats underneath timer inside ring -->
<div class="flex gap-6 mt-6 border-t border-surface-hover pt-4">
<div class="flex flex-col items-center">
<span class="font-mono text-[10px] text-muted tracking-[0.1em] uppercase">Est. End</span>
<span class="font-mono text-[14px] text-text-main mt-1">14:30</span>
</div>
<div class="flex flex-col items-center border-l border-surface-hover pl-6">
<span class="font-mono text-[10px] text-muted tracking-[0.1em] uppercase">Session Goal</span>
<span class="font-mono text-[14px] text-text-main mt-1">60m</span>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Section: Slide to Pause -->
<footer class="w-full pb-12 px-6 flex flex-col items-center justify-end z-10">
<!-- Slide Track Container -->
<div class="relative w-full max-w-sm h-[56px] bg-surface border border-surface-hover rounded-sm overflow-hidden flex items-center group/slider">
<!-- Instructions text behind slider -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<span class="font-mono text-[12px] uppercase tracking-[0.2em] text-muted">Slide to Pause</span>
</div>
<!-- Active Track fill (simulating partial slide) -->
<div class="absolute top-0 left-0 h-full bg-primary/10 w-16 transition-all duration-75"></div>
<!-- Draggable Thumb (simulated static position) -->
<div class="absolute left-1 top-1 bottom-1 w-[48px] bg-surface-hover border border-[#2A2A2A] flex items-center justify-center cursor-grab active:cursor-grabbing hover:bg-[#252525] transition-colors rounded-[1px]">
<span class="material-symbols-outlined text-primary text-xl shadow-neon">chevron_right</span>
</div>
</div>
<!-- System Status Footer -->
<div class="mt-6 flex items-center gap-4 border-t border-surface-hover pt-4 w-full max-w-sm justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[16px] text-muted">do_not_disturb_on</span>
<span class="font-mono text-[10px] text-muted uppercase tracking-[0.1em]">DND Active</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[16px] text-primary">wifi_tethering</span>
<span class="font-mono text-[10px] text-primary uppercase tracking-[0.1em]">Syncing</span>
</div>
</div>
</footer>
</body></html>
