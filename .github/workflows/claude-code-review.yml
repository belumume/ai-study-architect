name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          claude_args: "--model claude-sonnet-4-6"

          prompt: |
            Review this pull request thoroughly. Focus on:
            - Code quality, patterns, and best practices
            - Potential bugs, race conditions, or logic errors
            - Performance considerations and scalability
            - Security concerns (injection, auth, data leakage)
            - Test coverage gaps

            IMPORTANT: Read the actual code before flagging issues. Verify that:
            - Pydantic validators/Field patterns exist before claiming "missing validation"
            - Timer/math logic is correct before claiming "drift" or "accuracy issues"
            - Query patterns match before claiming "N+1"
            - Alembic DDL sa.text() in index WHERE clauses is standard, not SQL injection

            Be precise and actionable. False positives waste developer time.

          use_sticky_comment: true
