name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run backend tests
        run: |
          cd backend
          pytest tests/ --ignore=tests/scripts -v --tb=short
        env:
          JWT_SECRET_KEY: test-secret
          SECRET_KEY: test-secret
          DATABASE_URL: postgresql+psycopg2://test:test@localhost:5432/test_db
          RATELIMIT_ENABLED: "false"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Run frontend tests
        run: |
          cd frontend
          npm test -- --run

      - name: Security scan (privacy + secrets)
        run: |
          echo "=== Checking for hardcoded secrets ==="
          ! grep -rn "sk-ant-api\|sk-proj-\|ghp_\|AKIA[0-9A-Z]" \
            --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=venv --exclude-dir=.git \
            backend/ frontend/ worker/ \
          && echo "[OK] No hardcoded secrets found" \
          || { echo "[FAIL] Possible secrets in source code"; exit 1; }

          echo "=== Checking for personal paths in source ==="
          PERSONAL_PATHS=$(grep -rn "C:\\\\Users\\\\[a-zA-Z]\|/home/[a-zA-Z]" \
            --include="*.py" --include="*.ts" --include="*.tsx" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=venv --exclude-dir=.git \
            backend/ frontend/ worker/ 2>/dev/null || true)
          if [ -n "$PERSONAL_PATHS" ]; then
            echo "[WARN] Personal paths found:"
            echo "$PERSONAL_PATHS"
          else
            echo "[OK] No personal paths in source"
          fi

      - name: Semgrep security scan
        run: |
          pip install semgrep
          semgrep scan --config p/python-security --config p/owasp-top-ten \
            --quiet --metrics off --error \
            backend/app/
        continue-on-error: false

  migrate:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install migration dependencies
        run: |
          cd backend
          pip install alembic sqlalchemy psycopg2-binary pydantic pydantic-settings python-dotenv

      - name: Run Alembic migrations
        run: |
          cd backend
          alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          SECRET_KEY: migration-only
          JWT_SECRET_KEY: migration-only

  deploy:
    needs: migrate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install wrangler
        run: |
          cd worker
          npm ci

      - name: Deploy to Cloudflare
        run: |
          cd worker
          npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Health check
        run: |
          sleep 15
          response=$(curl -s -o /dev/null -w "%{http_code}" https://aistudyarchitect.com/api/v1/health/ready || true)
          echo "Health check status: $response"
          if [ "$response" = "200" ]; then
            echo "Health check passed"
          else
            echo "Health check returned $response (container may still be waking)"
          fi
