name: Test & Deploy Staging

on:
  push:
    branches: [develop, staging]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: ai_study_architect
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install backend dependencies
      run: |
        cd backend
        pip install -r requirements.txt

    - name: Run backend tests
      env:
        SECRET_KEY: test-secret-key-ci-only
        JWT_SECRET_KEY: test-jwt-secret-key-ci-only
        DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/ai_study_architect
        TEST_DATABASE_URL: postgresql+psycopg2://test_user:test_password@localhost:5432/ai_study_architect
        RATELIMIT_ENABLED: "false"
      run: |
        cd backend
        pytest tests/ --ignore=tests/scripts -v

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Run frontend tests
      run: |
        cd frontend
        npx vitest run

    - name: Build frontend
      run: |
        cd frontend
        npm run build

  deploy-staging:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Deploy to staging
      run: |
        cd worker
        npm ci
        npx wrangler deploy --env staging
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
